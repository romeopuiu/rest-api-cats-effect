version: "3.9"

services:

  db:
    image: postgres:16
    container_name: book-cats-effect
    restart: always
    environment:
      POSTGRES_DB: book-cats-effect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: rest-api-cats-effect
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/book-cats-effect
      DB_USER: postgres
      DB_PASSWORD: admin1234
    restart: always

volumes:
  postgres_data: